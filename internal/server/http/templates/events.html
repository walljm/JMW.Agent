{{template "head" .}}
{{template "navbar" .}}
<main class="container">
  <h1>Event log</h1>
  {{if .Events}}
  <ul class="event-list">
  {{range .Events}}
    <li class="evt evt-{{.Severity}}">
      <span class="evt-time">{{shortTime .Timestamp}}</span>
      <span class="evt-type">{{.Type}}</span>
      <span class="evt-summary">{{.Summary}}</span>
    </li>
  {{end}}
  </ul>
  {{else}}<p class="muted">No events recorded.</p>{{end}}
</main>
{{template "foot" .}}
