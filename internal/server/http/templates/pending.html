{{template "head" .}}
{{template "navbar" .}}
<main class="container">
  <h1>Pending approvals</h1>
  {{if .Pending}}
  <table class="data">
    <thead><tr><th>Hostname</th><th>OS</th><th>Version</th><th>Registered</th><th></th></tr></thead>
    <tbody>
    {{range .Pending}}
      <tr>
        <td>{{.Hostname}}</td>
        <td>{{.OS}}/{{.Arch}}</td>
        <td>{{.Version}}</td>
        <td>{{shortTime .RegisteredAt}}</td>
        <td>
          <form method="POST" action="/clients/{{.ID}}/approve">
            <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}" />
            <button class="primary" type="submit">Approve</button>
          </form>
        </td>
      </tr>
    {{end}}
    </tbody>
  </table>
  {{else}}
  <p class="muted">No agents are awaiting approval.</p>
  {{end}}
</main>
{{template "foot" .}}
