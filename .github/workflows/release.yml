name: Release

on:
  push:
    tags:
      # Strict semver: vMAJOR.MINOR.PATCH only. No prereleases, no build metadata.
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v5
        with:
          dotnet-version: "10.0.x"

      - id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish server (linux-x64, linux-arm64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for rid in linux-x64 linux-arm64; do
            echo "==> publishing server $rid"
            dotnet publish src/Server.Web/JMW.Discovery.Server.csproj \
              -c Release -r "$rid" --self-contained true \
              -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:Version="${VERSION#v}" \
              -o "dist/server-${rid}"
            mv "dist/server-${rid}/JMW.Discovery.Server" "dist/jmw-server-${rid}"
            # wwwroot is content, not bundled into the single file — ships alongside it.
            tar -czf "dist/jmw-server-${rid}-wwwroot.tar.gz" -C "dist/server-${rid}" wwwroot
            rm -rf "dist/server-${rid}"
          done

      - name: Publish agent (all platforms)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # jmw-agent-<os>-<arch>[.exe] — os/arch strings MUST match what the agent
          # self-reports (Agent.cs DetectOs/DetectArch: linux/macos/windows), which is
          # NOT the same as .NET's own RID vocabulary (osx, not macos) or Go's (darwin/amd64).
          declare -A targets=(
            [linux-x64]=linux-x64
            [linux-arm64]=linux-arm64
            [osx-x64]=macos-x64
            [osx-arm64]=macos-arm64
            [win-x64]=windows-x64
          )
          for rid in "${!targets[@]}"; do
            name="${targets[$rid]}"
            out="dist/jmw-agent-${name}"
            [ "$rid" = "win-x64" ] && out="${out}.exe"
            echo "==> publishing agent $rid -> $out"
            dotnet publish src/Agent/JMW.Discovery.Agent.csproj \
              -c Release -r "$rid" --self-contained true \
              -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:Version="${VERSION#v}" \
              -o "dist/agent-${rid}"
            if [ "$rid" = "win-x64" ]; then
              mv "dist/agent-${rid}/JMW.Discovery.Agent.exe" "$out"
            else
              mv "dist/agent-${rid}/JMW.Discovery.Agent" "$out"
            fi
            rm -rf "dist/agent-${rid}"
          done
          ls -la dist/

      - name: Sign agent update binaries
        env:
          AGENT_UPDATE_SIGNING_KEY: ${{ secrets.AGENT_UPDATE_SIGNING_KEY }}
          # Not named VERSION: MSBuild seeds properties from environment variables
          # case-insensitively, so a VERSION env var shadows the reserved MSBuild
          # `Version` property and NuGet.targets rejects our "vX.Y.Z" tag format
          # (SemVer disallows the leading "v") when `dotnet run` builds this tool.
          SIGN_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          keyfile="$(mktemp)"
          trap 'rm -f "$keyfile"' EXIT
          printf '%s' "$AGENT_UPDATE_SIGNING_KEY" > "$keyfile"
          dotnet run --project src/Tools/UpdateSign -c Release -- \
            sign --key "$keyfile" --version "$SIGN_VERSION" dist/jmw-agent-*

      - name: Write release checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > SHA256SUMS)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries
          path: dist/
          retention-days: 14

  github-release:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — needed for `gh release create` to know the repo

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign checksums
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.bundle --output-signature dist/SHA256SUMS.sig dist/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/*

  publish-docker:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — Dockerfile lives in the repo

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push multi-arch agent image
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f deploy/docker/Dockerfile.agent \
            -t "walljm/jmw-agent:${VERSION}" \
            -t "walljm/jmw-agent:latest" \
            --push \
            .

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign Docker image
        env:
          VERSION: ${{ needs.build.outputs.version }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "walljm/jmw-agent:${VERSION}"
          cosign sign --yes "walljm/jmw-agent:latest"

  deploy-server:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - name: Install + restart jmw-server
        run: |
          set -euo pipefail
          chmod 0755 dist/jmw-server-linux-x64
          mkdir -p dist/wwwroot
          tar -xzf dist/jmw-server-linux-x64-wwwroot.tar.gz -C dist/
          sudo /opt/jmw/bin/gha-deploy-server "$PWD/dist/jmw-server-linux-x64" "$PWD/dist/wwwroot"

  publish-agent-releases:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - name: Publish agent binaries to releases dir
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          sudo /opt/jmw/bin/gha-publish-agent-release "$VERSION" "$PWD/dist"
