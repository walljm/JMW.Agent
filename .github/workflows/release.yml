name: Release

on:
  push:
    tags:
      # Strict semver: vMAJOR.MINOR.PATCH only. No prereleases, no build metadata.
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod
          # Self-hosted runner already has a persistent GOMODCACHE; the cache
          # action otherwise fails noisily trying to overwrite read-only files.
          cache: false

      - id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - id: pubkey
        env:
          AGENT_UPDATE_SIGNING_KEY: ${{ secrets.AGENT_UPDATE_SIGNING_KEY }}
        run: |
          pk=$(go run ./cmd/updatesign -key "$AGENT_UPDATE_SIGNING_KEY" -print-public-key)
          echo "key=$pk" >> "$GITHUB_OUTPUT"

      - name: Build all binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          UPDATE_PUBLIC_KEY: ${{ steps.pubkey.outputs.key }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/walljm/jmwagent/internal/shared/version.Version=${VERSION} -X github.com/walljm/jmwagent/internal/shared/version.UpdatePublicKey=${UPDATE_PUBLIC_KEY}"

          # Agent: all platforms.
          for combo in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${combo%/*}; arch=${combo#*/}
            out="dist/jmw-agent-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "==> building $out"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags "$LDFLAGS" -o "$out" ./cmd/agent
          done

          # Server: linux only.
          for arch in amd64 arm64; do
            out="dist/jmw-server-linux-${arch}"
            echo "==> building $out"
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -ldflags "$LDFLAGS" -o "$out" ./cmd/server
          done
          ls -la dist/

      - name: Sign agent update binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          AGENT_UPDATE_SIGNING_KEY: ${{ secrets.AGENT_UPDATE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          go run ./cmd/updatesign -version "$VERSION" dist/jmw-agent-*

      - name: Write release checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum * > SHA256SUMS)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries
          path: dist/
          retention-days: 14

  github-release:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — needed for `gh release create` to know the repo

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign checksums
        run: cosign sign-blob --yes --bundle dist/SHA256SUMS.bundle --output-signature dist/SHA256SUMS.sig dist/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            dist/*

  publish-docker:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 — Dockerfile lives in the repo

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push multi-arch agent image
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=${VERSION}" \
            -f deploy/docker/Dockerfile.agent \
            -t "walljm/jmw-agent:${VERSION}" \
            -t "walljm/jmw-agent:latest" \
            --push \
            .

      - name: Verify Home Assistant add-on version
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          addon_version=$(sed -n 's/^version: "\(.*\)"/\1/p' jmw-agent/config.yaml)
          if [[ "v${addon_version}" != "${VERSION}" ]]; then
            echo "Home Assistant add-on version ${addon_version} must match release tag ${VERSION}" >&2
            exit 1
          fi
          echo "ADDON_VERSION=${addon_version}" >> "$GITHUB_ENV"

      - name: Build & push Home Assistant add-on image
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "BINARY_VERSION=${VERSION}" \
            --build-arg "ADDON_VERSION=${ADDON_VERSION}" \
            -f jmw-agent/Dockerfile \
            -t "walljm/jmw-agent-ha:${ADDON_VERSION}" \
            -t "walljm/jmw-agent-ha:${VERSION}" \
            -t "walljm/jmw-agent-ha:latest" \
            --push \
            .

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign Docker image
        env:
          VERSION: ${{ needs.build.outputs.version }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "walljm/jmw-agent:${VERSION}"
          cosign sign --yes "walljm/jmw-agent:latest"
          cosign sign --yes "walljm/jmw-agent-ha:${ADDON_VERSION}"
          cosign sign --yes "walljm/jmw-agent-ha:${VERSION}"
          cosign sign --yes "walljm/jmw-agent-ha:latest"

  deploy-server:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - name: Install + restart jmw-server
        run: |
          set -euo pipefail
          chmod 0755 dist/jmw-server-linux-amd64
          sudo /opt/jmw/bin/gha-deploy-server "$PWD/dist/jmw-server-linux-amd64"

  publish-agent-releases:
    needs: build
    runs-on: [self-hosted, core-services]
    permissions:
      actions: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: binaries
          path: dist/

      - name: Publish agent binaries to releases dir
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          sudo /opt/jmw/bin/gha-publish-agent-release "$VERSION" "$PWD/dist"
