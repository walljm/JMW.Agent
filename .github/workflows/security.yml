name: Security

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  schedule:
    - cron: "37 9 * * 1"
  workflow_dispatch:

# Self-hosted runners cannot safely accept PR workflows from forks. Security
# analysis runs on trusted pushes plus a weekly schedule.

permissions:
  contents: read

jobs:
  codeql:
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v5
        with:
          dotnet-version: "10.0.x"

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: csharp

      - name: Build (for CodeQL analysis)
        run: dotnet build JMW.Discovery.slnx -c Release

      - uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          category: "/language:csharp"

  dotnet-vulnerable-packages:
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v5
        with:
          dotnet-version: "10.0.x"

      - name: Check for vulnerable NuGet packages
        run: |
          set -euo pipefail
          out=$(dotnet list JMW.Discovery.slnx package --vulnerable --include-transitive 2>&1)
          echo "$out"
          if echo "$out" | grep -q "has the following vulnerable packages"; then
            echo "Vulnerable packages found — see output above." >&2
            exit 1
          fi

  trivy:
    runs-on: [self-hosted, core-services]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          sarif_file: trivy-results.sarif
