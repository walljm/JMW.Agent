name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"] # release.yml handles tags
  workflow_dispatch:

# Self-hosted runners cannot safely accept PR workflows from forks (the PR
# author could exfiltrate from the box), so we only trigger on push from
# the same repository. There is no fork-PR flow on this repo anyway.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: [self-hosted, core-services]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v5
        with:
          dotnet-version: "10.0.x"

      - name: dotnet build
        # TreatWarningsAsErrors + EnforceCodeStyleInBuild are already set solution-wide
        # (src/Directory.Build.props) — a plain build fails on warnings and style violations.
        run: dotnet build JMW.Discovery.slnx -c Release

      - name: dotnet format check
        run: dotnet format JMW.Discovery.slnx --verify-no-changes

      - name: Unit tests
        run: dotnet test test/Unit/JMW.Discovery.UnitTests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Integration tests
        # Deliberately NOT -c Release/--no-build: the schema-validation theory tests
        # (ServerQueryValidationTests) rely on companion validator methods the source
        # generator only emits under `#if DEBUG` — in Release the data source is empty and
        # the theory fails outright ("No data found"). Needs Docker for Testcontainers (Postgres).
        run: dotnet test test/Integration/JMW.Discovery.IntegrationTests.csproj --logger "console;verbosity=normal"
